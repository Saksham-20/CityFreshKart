services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-cityfreshkart}
      POSTGRES_USER: ${DB_USER:-cityfreshkart_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
    volumes:
      - cityfreshkart_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-cityfreshkart}
      DB_USER: ${DB_USER:-cityfreshkart_user}
      DB_PASSWORD: ${DB_PASSWORD:-change_me}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:8080}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      JWT_SECRET: ${JWT_SECRET:-change_me}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
    ports:
      - "8080:5000"
    volumes:
      - cityfreshkart_uploads:/app/server/uploads

volumes:
  cityfreshkart_pg:
  cityfreshkart_uploads:

